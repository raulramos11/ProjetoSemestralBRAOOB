version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: rankitup-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 3132
      MYSQL_DATABASE: rankitup_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p3132"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rankitup-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rankitup_db?createDatabaseIfNotExist=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 3132
      JWT_SECRET: rankitup-chave-secreta-super-longa-para-hmac-sha256-2026
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ~/.m2:/root/.m2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rankitup-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8080

volumes:
  mysql_data: